# groups.yaml — 群聊画像库（Hermes 本地知识库）
# ---------------------------------------------------------------------------
# 作用：让 Hermes 在「不同的群」用不同的语言风格和能力栈来应对——自我介绍、
#       说明自己能做什么、整体语气都按本群定制，从而对不同人群体现针对性。
#       本文件由你手工维护，存放在 ~/.hermes（config repo），git 入库、可版本化，
#       hermes-agent 升级不会覆盖它。改动保存后 gateway 会在下一条消息按文件
#       mtime 自动重新加载，无需重启。
#
# 重要边界：这里只改变「怎么表达 / 怎么介绍」，**不改变沙箱与安全边界**——
#           风控、只读工具集、不允许的操作在所有群里完全一致（沙箱在
#           config.yaml 的 platform_toolsets.feishu_group / plugins/sandbox 配置）。
#
# 匹配方式（命中任意一个即注入该群画像）：
#   chat_id / chat_id_alt  —— 群的稳定 ID（飞书为 oc_ 开头），最可靠
#   name / aliases         —— 群名与别名，方便人读，作兜底匹配
#   建议至少填 chat_id（最稳）+ name（给你自己看）。
#
# 字段（留空即不注入该行，全部是「表达层」，无机密）：
#   style            语言风格 / 语气（正式 vs 轻松、术语精度、回复长度偏好…）
#   capabilities     能力栈：在这个群你可以对外介绍自己能做哪些事
#   audience         群成员画像（面向谁、他们关心什么）
#   intro            自我介绍口径（首次/被问到时怎么一句话介绍自己）
#   service_hours    原样注入、对外展示的服务/接客时间文本；自我介绍或被问及时会带上，
#                    仅作提示，不限制 Hermes 在其它时间回复
#   nightly_greeting 设为 false 可让本群保留画像、但不收每日晚安群发；
#                    缺省（不写）= 照常群发。见 scripts/nightly_greeting.py
#   notes            其它备注
#
# 不在这里配的群：自动回退到「无画像」——仍会注入通用的「能力受限声明规则」，
#                 只是没有定制语气。
#
# 唯一群信息入口：本文件是所有飞书群 chat_id 的唯一登记处（晚安群发、路由都从
#                 这里取）。skill my-skills/productivity/feishu-groups/SKILL.md
#                 只讲「怎么发消息」，不再单独维护 chat_id 列表。
# ---------------------------------------------------------------------------

groups:
