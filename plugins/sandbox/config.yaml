# Per-chat tool restriction for Feishu.
#
# Only the chat_ids listed below get unrestricted access. Every other Feishu
# chat_id can only call the tools in `allowed_tools_for_outsiders`. Messages
# coming from non-Feishu sources (CLI/TUI, cron, internal) are never gated.
#
# To rotate or extend: edit this file and restart the gateway.

owner_feishu_chat_ids:
  - oc_c8221472cf59b202ccd0682cf6cea296

allowed_tools_for_outsiders:
  - web_search
  - web_extract
  - vision_analyze
  - image_generate

# Extra allowlist for non-owner Feishu group/channel chats only. Keep this
# read-only. Skill names are still constrained by `skills.platform_allowed`.
# File reads/searches are additionally constrained to the roots below.
allowed_tools_for_outsider_groups:
  - skills_list
  - skill_view
  - feishu_doc_read
  - read_file
  - search_files

allowed_read_roots_for_outsider_groups:
  - ~/.hermes/wiki

block_message: "本会话不支持该工具。当前会话仅开放：聊天问答 / 联网搜索 / 网页正文抓取 / 图片理解 / 图片生成；群聊额外开放只读知识库、飞书文档读取、以及 ~/.hermes/wiki 范围内的只读文件检索。"
